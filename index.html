<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Pages</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      margin: 0;
      display: flex;
      height: 100vh;
      align-items: center;
      justify-content: center;
    }

    .container {
      text-align: center;
    }

    h1 {
      margin-bottom: 30px;
    }

    .links {
      display: flex;
      gap: 20px;
      justify-content: center;
    }

    a {
      padding: 15px 25px;
      background: #2563eb;
      color: white;
      text-decoration: none;
      border-radius: 10px;
      transition: 0.2s;
    }

    a:hover {
      background: #1d4ed8;
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>My Hosted Pages</h1>

    <div class="links">
      <a href="page1.html">Page 1</a>
      <a href="page2.html">Page 2</a>
    </div>

  </div>
</body>
</html>
